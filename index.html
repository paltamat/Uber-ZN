<style>
  :root {
    --bg: #000000;
    --bg-elevated: #1c1c1e;
    --bg-elevated-2: #2c2c2e;
    --border: #38383a;
    --border-soft: #2c2c2e;
    --text-primary: #ffffff;
    --text-secondary: #98989d;
    --text-tertiary: #636366;
    --accent: #0a84ff;
    --accent-soft: rgba(10, 132, 255, 0.16);
    --success: #30d158;
    --warning: #ff9f0a;
    --danger: #ff453a;
    --ratio-gold: #d4a72c;
    --radius: 14px;
    --radius-sm: 10px;
    --radius-lg: 26px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #app { max-width: 560px; margin: 0 auto; padding: 20px 16px 110px; }

  .top-header { padding: 16px 4px 24px; text-align: center; }
  .top-header .title-pill {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  }
  .top-header .title-logo { display: inline-flex; width: 40px; height: 40px; flex-shrink: 0; }
  .top-header .title-logo svg { display: block; }
  .top-header .eyebrow {
    font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--accent); margin: 0 0 4px;
  }
  .top-header h1 { font-size: 30px; font-weight: 800; margin: 0; letter-spacing: -0.02em; white-space: nowrap; }
  .top-header p { font-size: 13px; color: var(--text-secondary); margin: 6px 0 0; }

  .tabbar {
    position: fixed; left: 0; right: 0; bottom: 0; width: 100%;
    height: 78px; z-index: 50;
  }
  .tabbar-bg {
    position: absolute; inset: 0; display: flex; align-items: flex-start;
    background: #4a4a4c; border-radius: 28px 28px 0 0; overflow: hidden;
    padding-bottom: env(safe-area-inset-bottom, 0px);
    box-shadow: 0 -8px 24px rgba(0,0,0,0.5);
  }
  .tab-side {
    width: 70px; height: 78px; display: flex; align-items: center; justify-content: center;
    border: none; background: transparent; cursor: pointer; padding: 0; flex-shrink: 0;
    transition: background 0.15s ease; box-sizing: border-box;
  }
  .tab-spacer { width: 86px; height: 100%; flex-shrink: 0; }
  .tab-side.outer-left { flex: 1; justify-content: center; border-right: 1px solid rgba(255,255,255,0.12); }
  .tab-side.outer-right { flex: 1; justify-content: center; border-left: 1px solid rgba(255,255,255,0.12); }
  .tab-inner-cluster { position: relative; display: flex; align-items: center; height: 78px; flex-shrink: 0; }
  .tab-side .tab-icon { color: var(--text-secondary); transition: color 0.15s ease; }
  .tab-side.active { background: var(--accent); }
  .tab-side.active .tab-icon { color: #ffffff; }

  .tab-icon { display: inline-flex; width: 22px; height: 22px; }
  .tab-icon svg { width: 100%; height: 100%; display: block; }

  .tab-btn.center {
    position: absolute; left: 50%; bottom: 14px; transform: translateX(-50%);
    border: none; background: transparent; cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .tab-icon-wrap {

function pad2(n){ return (n < 10 ? "0" : "") + n; }
function toISODate(d){ return d.getFullYear() + "-" + pad2(d.getMonth()+1) + "-" + pad2(d.getDate()); }
function isoToDisplay(iso){ var parts = iso.split("-"); return parts[2] + "/" + parts[1] + "/" + parts[0]; }
function getUpcomingThursday(now){
  var day = now.getDay();
  var hour = now.getHours();
  var diff;
  if (day === 4) { diff = 0; }
  else if (day === 5) { diff = (hour < 7) ? -1 : 6; }
  else if (day === 6) { diff = 5; }
  else { diff = (4 - day + 7) % 7; }
  var d = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  d.setDate(d.getDate() + diff);
  return d;
}
var matchDateISO = toISODate(getUpcomingThursday(new Date()));

/* ---------- Utilidades ---------- */
function ratioDe(p){
  var efectivos = p.viajesChofer + Math.floor(p.colectivos * 0.5);
  return p.viajesPasajero === 0 ? efectivos : efectivos / p.viajesPasajero;
}
function promedio(arr){ return arr.length ? arr.reduce(function(a,b){return a+b;},0)/arr.length : null; }
function distKm(a,b){
  var R=6371;
  var dLat=(b.lat-a.lat)*Math.PI/180;
  var dLng=(b.lng-a.lng)*Math.PI/180;
  var la1=a.lat*Math.PI/180, la2=b.lat*Math.PI/180;
  var h=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return 2*R*Math.asin(Math.sqrt(h));
}
function parseTime(t){ var parts=t.split(":"); return parseInt(parts[0],10)*60+parseInt(parts[1],10); }
function formatTime(mins){ mins=Math.round(mins); var h=Math.floor(mins/60)%24; var m=mins%60; if(h<0)h+=24; return (h<10?"0":"")+h+":"+(m<10?"0":"")+m; }

var GOOGLE_MAPS_READY = false;
function onGoogleMapsLoaded(){
  GOOGLE_MAPS_READY = true;
  if (activeTab === "semana" && result && result.cars) render();
}

function computeRouteFallback(driver, passengers){
  var speed=28, stopMin=2;
  var current = { lat: driver.lat, lng: driver.lng };
  var remaining = passengers.slice();
  var relative = 0;
  var legs = [];
  while (remaining.length){
    var nearestIdx=0, nearestDist=Infinity;
    remaining.forEach(function(p,idx){ var d=distKm(current,p); if(d<nearestDist){nearestDist=d;nearestIdx=idx;} });
    var next = remaining[nearestIdx];
    relative += nearestDist/speed*60;
    legs.push({ name: next.name, address: next.address, arrivalRelative: relative, lat:next.lat, lng:next.lng });
    relative += stopMin;
    current = { lat: next.lat, lng: next.lng };
    remaining.splice(nearestIdx,1);
  }
  var toVenue = distKm(current, venue)/speed*60;
  relative += toVenue;
  legs.push({ name: venue.name, address: venue.address, arrivalRelative: relative, lat:venue.lat, lng:venue.lng });
  var matchMin = parseTime(matchTime);
  var plannedDepartureMin = matchMin - relative;
  return { plannedDepartureMin: plannedDepartureMin, legs: legs, live: false };
}

function getRouteForCar(driver, passengers){
  return new Promise(function(resolve){
    if (!GOOGLE_MAPS_READY || !passengers){
      resolve(computeRouteFallback(driver, passengers));
      return;
    }
    try {
      var service = new google.maps.DirectionsService();
      var waypoints = passengers.map(function(p){ return { location: p.address, stopover: true }; });
      var departureGuess = new Date(matchDateISO + "T" + matchTime + ":00");
      service.route({
        origin: driver.address,
        destination: venue.address,
        waypoints: waypoints,
        optimizeWaypoints: true,
        travelMode: google.maps.TravelMode.DRIVING,
        drivingOptions: { departureTime: departureGuess, trafficModel: google.maps.TrafficModel.BEST_GUESS }
      }, function(dirResult, status){
        if (status !== "OK" || !dirResult.routes || !dirResult.routes[0]){
          resolve(computeRouteFallback(driver, passengers));
          return;
        }
        try {
          var route0 = dirResult.routes[0];
          var order = route0.waypoint_order || passengers.map(function(_,i){ return i; });
          var orderedPassengers = order.map(function(idx){ return passengers[idx]; });
          var relative = 0;
          var legs = [];
          route0.legs.forEach(function(leg, i){
            var durSec = (leg.duration_in_traffic ? leg.duration_in_traffic.value : leg.duration.value);
            relative += durSec / 60;
            var isLast = i === route0.legs.length - 1;
            var stop = isLast ? venue : orderedPassengers[i];
            legs.push({ name: stop.name, address: stop.address, arrivalRelative: relative, lat: stop.lat, lng: stop.lng });
          });
          var matchMin = parseTime(matchTime);
          var plannedDepartureMin = matchMin - relative;
          resolve({ plannedDepartureMin: plannedDepartureMin, legs: legs, live: true, directions: dirResult });
        } catch (e){
          resolve(computeRouteFallback(driver, passengers));
        }
      });
    } catch (e){
      resolve(computeRouteFallback(driver, passengers));
    }
  });
}

/* ---------- Acciones ---------- */
function lastDriveDateOf(p){
  for (var i = 0; i < poolHistory.length; i++){
    var h = poolHistory[i];
    if (h.driverIds && h.driverIds.indexOf(p.id) !== -1) return h.dateISO || "";
  }
  return "";
}

function calcularSemana(){
  var conf = players.filter(function(p){ return confirmed[p.id]; });
  if (conf.length < 2){ result = { error: "Necesitas al menos 2 confirmados para armar el pool." }; render(); return; }
  var ordenados = conf.slice().sort(function(a,b){
    var diff = ratioDe(a) - ratioDe(b);
    if (diff !== 0) return diff;
    var lastA = lastDriveDateOf(a), lastB = lastDriveDateOf(b);
    if (lastA < lastB) return -1;
    if (lastA > lastB) return 1;
    return 0;
  });
  var dosAutos = conf.length === 6;
  var drivers = dosAutos ? [ordenados[0], ordenados[1]] : [ordenados[0]];
  var cars;
  if (!dosAutos){
    cars = [{ driver: drivers[0], passengers: conf.filter(function(p){ return p.id !== drivers[0].id; }) }];
  } else {
    var driverIds = drivers.map(function(d){ return d.id; });
    var remaining = conf.filter(function(p){ return driverIds.indexOf(p.id) === -1; });
    var bucketA = remaining.filter(function(p){ return p.group==="A"; });
    var bucketB = remaining.filter(function(p){ return p.group==="B"; });
    var c0 = { driver: drivers[0], passengers: [] };
    var c1 = { driver: drivers[1], passengers: [] };
    var buckets = [bucketB, bucketA].sort(function(x,y){ return y.length-x.length; });
    buckets.forEach(function(bucket){
      var target = c0.passengers.length <= c1.passengers.length ? c0 : c1;
      target.passengers = target.passengers.concat(bucket);
    });
    cars = [c0, c1];
  }
  var carsBase = cars.map(function(c){ return Object.assign({}, c, { colectivo: c.passengers.length === 4 }); });
  result = { loading: true };
  ratingsInput = {};
  weekSaved = false;
  enCamino = {};
  render();

  Promise.all(carsBase.map(function(c){ return getRouteForCar(c.driver, c.passengers); })).then(function(routes){
    result = { cars: carsBase.map(function(c, i){ return Object.assign({}, c, { route: routes[i] }); }) };
    render();
    setTimeout(function(){
      var mapEl = document.querySelector(".map-wrap");
      if (mapEl) mapEl.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 50);
  });
}

function guardarSemana(){
  if (!result || result.error) return;
  var yaExiste = poolHistory.some(function(h){ return h.dateISO === matchDateISO && h.driverIds && h.driverIds.length; });
  if (yaExiste){
    alert("Ya hay una semana guardada para esta fecha (alguien ya designo choferes). Revisa el Historial en vez de guardar de nuevo.");
    weekSaved = true;
    render();
    return;
  }
  var histEntry = {
    fecha: isoToDisplay(matchDateISO),
    dateISO: matchDateISO,
    timestamp: Date.now(),
    drivers: result.cars.map(function(c){return c.driver.name;}),
    driverIds: result.cars.map(function(c){return c.driver.id;}),
    passengers: {}
  };
  result.cars.forEach(function(c){ histEntry.passengers[c.driver.name] = c.passengers.map(function(p){return p.name;}); });
  poolHistory = [histEntry].concat(poolHistory);

  players = players.map(function(p){
    var asDriver = result.cars.filter(function(c){ return c.driver.id === p.id; })[0];
    var asPassenger = result.cars.filter(function(c){ return c.passengers.some(function(x){ return x.id === p.id; }); })[0];
    if (asDriver){
      var nuevoColectivo = asDriver.colectivo ? p.colectivos + 1 : p.colectivos;
      return Object.assign({}, p, { viajesChofer: p.viajesChofer + 1, colectivos: nuevoColectivo });
    }
    if (asPassenger){ return Object.assign({}, p, { viajesPasajero: p.viajesPasajero + 1 }); }
    return p;
  });
  weekSaved = true;
  saveState();
  render();
}

function getCalificarEntry(){
  var now = new Date();
  var day = now.getDay();
  var diffBack = (day - 4 + 7) % 7;
  var lastThu = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  lastThu.setDate(lastThu.getDate() - diffBack);
  var fridayMidnight = new Date(lastThu.getFullYear(), lastThu.getMonth(), lastThu.getDate() + 1);
  if (now < fridayMidnight) return null;
  var iso = toISODate(lastThu);
  var entry = poolHistory.filter(function(h){ return h.dateISO === iso && h.driverIds && h.driverIds.length; })[0];
  if (!entry) return null;
  var hasVoted = !!(currentUserId && entry.votedBy && entry.votedBy.indexOf(currentUserId) !== -1);
  var cutoff = hasVoted
    ? new Date(fridayMidnight.getTime() + 5 * 60 * 60 * 1000)
    : new Date(lastThu.getFullYear(), lastThu.getMonth(), lastThu.getDate() + 7);
  if (now >= cutoff) return null;
  return entry;
}

function submitRating(driverId, n){
  ratingsInput[driverId] = n;
  players = players.map(function(p){ return p.id === driverId ? Object.assign({}, p, { ratings: p.ratings.concat([n]) }) : p; });
  var entry = getCalificarEntry();
  if (entry){
    if (!entry.votedBy) entry.votedBy = [];
    if (currentUserId && entry.votedBy.indexOf(currentUserId) === -1) entry.votedBy.push(currentUserId);
  }
  saveState();
  render();
}

function handlePhotoUpload(id, input){
  var file = input.files && input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    var img = new Image();
    img.onload = function(){
      var size = 240;
      var canvas = document.createElement("canvas");
      canvas.width = size; canvas.height = size;
      var ctx = canvas.getContext("2d");
      var side = Math.min(img.width, img.height);
      var sx = (img.width - side) / 2, sy = (img.height - side) / 2;
      ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
      var dataUrl = canvas.toDataURL("image/jpeg", 0.75);
      updatePhoto(id, dataUrl);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function showToast(msg){
  var el = document.getElementById("toast");
  if (!el) {
    el = document.createElement("div");
    el.id = "toast";
    el.style.cssText = "position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#2c2c2e;color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;z-index:60;opacity:0;transition:opacity 0.2s ease;box-shadow:0 6px 16px rgba(0,0,0,0.4);";
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = "1";
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(function(){ el.style.opacity = "0"; }, 1600);
}

function addPlayer(){
  var name = prompt("Nombre del nuevo jugador:");

  var id = name.toLowerCase().replace(/[^a-z0-9]/g, "") + "_" + Date.now();
  players = players.concat([{ id:id, name:name.trim(), group:"B", car:{model:"Sin auto", plate:"-"}, viajesChofer:0, viajesPasajero:0, colectivos:0, ratings:[], address:"Sin direccion", lat:venue.lat, lng:venue.lng }]);

function exportBackup(){
  var data = JSON.stringify({ players: players, poolHistory: poolHistory, venue: venue }, null, 2);
  var blob = new Blob([data], { type: "application/json" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "pool-jueves-backup.json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
function importBackup(input){
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try {
      var data = JSON.parse(e.target.result);
      if (data.players) players = data.players;
      if (data.poolHistory) poolHistory = data.poolHistory;
      if (data.venue) venue = Object.assign(venue, data.venue);
      players.forEach(function(p){ if (!(p.id in confirmed)) confirmed[p.id] = true; });
      saveState();
      render();
      alert("Backup restaurado con exito.");
    } catch (err) {
      alert("El archivo no parece un backup valido.");
    }
  };
  reader.readAsText(file);
}
function resetAllData(){
  if (!confirm("Esto borra todos los ratios, estrellas e historial. No se puede deshacer. Continuar?")) return;
  players = players.map(function(p){ return Object.assign({}, p, { viajesChofer:0, viajesPasajero:0, colectivos:0, ratings:[] }); });
  poolHistory = [];
  saveState();

}
function saveEditProfile(id){

  });

  editingProfileId = null;
  render();
}

function routeBlock(c, color){

  var stops = route.legs.map(function(l,i){
    var isVenue = i === route.legs.length - 1;
    var arrival = formatTime(base + l.arrivalRelative);
    return '<div class="route-stop">' +
      '<span class="route-time" style="color:' + color + ';">' + arrival + '</span>' +
      '<i class="ti ti-' + (isVenue ? "flag-3" : "map-pin") + '"></i>' +
      '<span>' + l.name + (isVenue ? "" : " &middot; " + l.address) + '</span>' +
    '</div>';
  }).join("");
  var headerLabel = (real !== undefined)
    ? '<span class="pill pill-green"><i class="ti ti-circle-check"></i>Salio a las ' + formatTime(real) + '</span>'
    : '<span class="pill pill-gray">Plan: sale a las ' + formatTime(route.plannedDepartureMin) + '</span>';
  return '<div class="divider"></div><div style="margin-bottom:6px;">' + headerLabel + '</div>' + stops;

function carBlock(c, i){

    routeBlock(c, color) +

function mapSvg(cars){
  var points = [{lat:venue.lat,lng:venue.lng}];
  cars.forEach(function(c){ points.push({lat:c.driver.lat,lng:c.driver.lng}); c.passengers.forEach(function(p){ points.push({lat:p.lat,lng:p.lng}); }); });
  var lats = points.map(function(p){return p.lat;}), lngs = points.map(function(p){return p.lng;});
  var minLat=Math.min.apply(null,lats), maxLat=Math.max.apply(null,lats);
  var minLng=Math.min.apply(null,lngs), maxLng=Math.max.apply(null,lngs);
  var padLat=(maxLat-minLat)*0.15 || 0.005, padLng=(maxLng-minLng)*0.15 || 0.005;
  minLat-=padLat; maxLat+=padLat; minLng-=padLng; maxLng+=padLng;
  var W=520,H=320;
  function xy(p){ var x=(p.lng-minLng)/(maxLng-minLng)*W; var y=(1-(p.lat-minLat)/(maxLat-minLat))*H; return [x,y]; }
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block;background:#0d0d0f;">';
  cars.forEach(function(c,ci){
    var color = carColors[ci % carColors.length];
    var order = [{lat:c.driver.lat,lng:c.driver.lng}].concat(c.route.legs.map(function(l){return {lat:l.lat,lng:l.lng};}));
    var d = "";
    order.forEach(function(pt,idx){ var xy2=xy(pt); d += (idx===0?"M":"L") + xy2[0] + " " + xy2[1] + " "; });
    svg += '<path d="'+d+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-dasharray="5,4" opacity="0.85" />';
  });
  var vxy = xy(venue);
  svg += '<circle cx="'+vxy[0]+'" cy="'+vxy[1]+'" r="7" fill="#8E8E93" />';
  svg += '<text x="'+(vxy[0]+10)+'" y="'+(vxy[1]+4)+'" font-size="11" fill="#98989d">Cancha</text>';
  cars.forEach(function(c,ci){
    var color = carColors[ci % carColors.length];
    var dxy = xy(c.driver);
    svg += '<circle cx="'+dxy[0]+'" cy="'+dxy[1]+'" r="8" fill="'+color+'" />';
    svg += '<text x="'+(dxy[0]+11)+'" y="'+(dxy[1]+4)+'" font-size="11" fill="#ffffff">'+c.driver.name+'</text>';
    c.passengers.forEach(function(p){
      var pxy = xy(p);
      svg += '<circle cx="'+pxy[0]+'" cy="'+pxy[1]+'" r="6" fill="'+color+'" fill-opacity="0.55" />';
      svg += '<text x="'+(pxy[0]+9)+'" y="'+(pxy[1]+4)+'" font-size="11" fill="#98989d">'+p.name+'</text>';
    });
  });
  svg += '</svg>';
  return svg;
}

function ratingRow(c){
  var val = ratingsInput[c.driver.id] || 0;
  var stars = "";
  for (var n=1;n<=5;n++){
    stars += '<button class="star-btn" onclick="setRating(\'' + c.driver.id + '\', ' + n + ')"><i class="ti ti-star" style="font-size:20px;opacity:' + (n<=val?1:0.3) + '"></i></button>';
  }
  return '<div class="row" style="margin-top:8px;"><span style="font-size:13px;color:var(--text-secondary);">' + c.driver.name + '</span><div>' + stars + '</div></div>';
}

function getMyCars(cars){
  if (!currentUserId) return cars;
  var mine = cars.filter(function(c){
    return c.driver.id === currentUserId || c.passengers.some(function(p){ return p.id === currentUserId; });
  });
  return mine.length ? mine : cars;
}

function calificarCard(entry){
  if (!currentUserId) return "";
  var driverIds = entry.driverIds || [];
  if (driverIds.indexOf(currentUserId) !== -1) return "";
  var me = players.filter(function(p){ return p.id === currentUserId; })[0];
  if (!me) return "";
  var wasPassenger = entry.passengers && Object.keys(entry.passengers).some(function(k){ return entry.passengers[k].indexOf(me.name) !== -1; });
  if (!wasPassenger) return "";
  var rows = "";
  driverIds.forEach(function(did){
    var driver = players.filter(function(p){ return p.id === did; })[0];
    if (!driver) return;
    var val = ratingsInput[did] || 0;
    var stars = "";
    for (var n=1;n<=5;n++){
      var color = n <= val ? "var(--warning)" : "var(--text-tertiary)";
      stars += '<button class="star-btn" onclick="submitRating(\'' + did + '\', ' + n + ')"><span class="stat-icon" style="width:22px;height:22px;color:' + color + ';">' + ICON_STAR + '</span></button>';
    }
    rows += '<div class="row" style="margin-top:8px;"><span style="font-size:14px;">' + driver.name + '</span><div style="display:flex;">' + stars + '</div></div>';
  });
  if (!rows) return "";
  return '<div class="card"><p style="margin:0;font-size:15px;font-weight:700;">Calificar</p>' + rows + '</div>';
}

function renderSemana(){
  var html = "";
  var calEntry = getCalificarEntry();
  if (calEntry) { var calHtml = calificarCard(calEntry); if (calHtml) html += calHtml; }

  html += '<div class="card">';
  html += '<label class="field-label" style="margin-top:0;">Fecha</label>';
  html += '<input type="date" value="' + matchDateISO + '" onchange="setMatchDate(this.value)" style="margin-bottom:12px;" />';
  html += '<label class="field-label">Llegada</label>';
  html += '<input type="time" value="' + matchTime + '" onchange="setMatchTime(this.value)" />';
  html += '</div>';

  html += players.map(playerCardMini).join("");
  html += '<button class="btn-primary" onclick="calcularSemana()" style="margin-top:6px;"><i class="ti ti-refresh"></i>Designar choferes</button>';

  if (result && result.error){
    html += '<p style="color:var(--danger);font-size:13px;margin-top:12px;">' + result.error + '</p>';
  }
  if (result && result.loading){
    html += '<p style="font-size:13px;color:var(--text-secondary);margin-top:12px;">Calculando rutas con tránsito real...</p>';
  }
  if (result && result.cars){
    var carsToShow = getMyCars(result.cars);
    var anyLive = carsToShow.some(function(c){ return c.route && c.route.live; });
    if (GOOGLE_MAPS_READY && anyLive){
      html += '<div class="map-wrap" style="margin-top:16px;"><div id="gmap" style="width:100%;height:280px;"></div></div>';
    } else {
      html += '<div class="map-wrap" style="margin-top:16px;">' + mapSvg(carsToShow) + '</div>';
    }
    html += carsToShow.map(carBlock).join("");
    if (!weekSaved){
      html += '<div style="display:flex;gap:8px;margin-top:14px;">';
      html += '<button class="btn-secondary" style="flex:1;" onclick="calcularSemana()"><i class="ti ti-refresh"></i> Volver a designar</button>';
      html += '<button class="btn-primary" onclick="guardarSemana()" style="flex:1;background:var(--bg-elevated-2);color:var(--text-primary);"><i class="ti ti-check"></i>Guardar semana</button>';
      html += '</div>';
    } else {
      html += '<p style="font-size:13px;color:var(--success);margin-top:8px;display:flex;align-items:center;gap:6px;"><i class="ti ti-trophy"></i>Semana guardada en el historial.</p>';
    }
  }

function profileCard(p){
  var ratio = ratioDe(p);
  var avg = promedio(p.ratings);
  return '<div class="card" style="position:relative;padding:18px 18px 20px;border-radius:var(--radius-lg);">' +
    '<div class="row-start">' +
      avatarHtml(p, 50, 16, "background:#182338;color:#4d94ff;") +
      '<p class="name" style="font-size:20px;">' + p.name + '</p>' +
    '</div>' +
    '<div style="text-align:center;margin:8px 0 10px;">' +
      '<p style="margin:0;font-size:52px;font-weight:800;letter-spacing:-0.01em;color:' + ratioColor(ratio) + ';">' + formatRatio(ratio) + '</p>' +
    '</div>' +
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-top:8px;color:var(--text-secondary);font-size:18px;font-weight:600;">' +
      '<span style="display:flex;flex-direction:column;align-items:center;gap:4px;"><span class="stat-icon">' + ICON_WHEEL + '</span>' + p.viajesChofer + '</span>' +
      '<span style="display:flex;flex-direction:column;align-items:center;gap:4px;"><span class="stat-icon">' + ICON_SEATBELT + '</span>' + p.viajesPasajero + '</span>' +
      '<span style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;" onclick="openRatings(\'' + p.id + '\')"><span class="stat-icon">' + ICON_STAR + '</span>' + (avg ? avg.toFixed(1) : "-") + '</span>' +
      '<span style="display:flex;flex-direction:column;align-items:center;gap:4px;"><span class="stat-icon">' + ICON_BUS + '</span>' + p.colectivos + '</span>' +
    '</div>' +
    '<div class="divider"></div>' +
    '<p style="font-size:14px;color:var(--text-secondary);margin:0;">' + ICON_CAR + ' ' + p.car.model + ' &middot; ' + p.car.plate + '</p>' +
    '<p style="font-size:14px;color:var(--text-secondary);margin:10px 0 0;">' + ICON_HOUSE + ' ' + p.address + '</p>' +
  '</div>';
}

function openRatings(id){ viewingRatingsId = id; render(); }
function closeRatings(){ viewingRatingsId = null; render(); }

function ratingsModal(){
  if (!viewingRatingsId) return "";
  var p = players.filter(function(x){ return x.id === viewingRatingsId; })[0];
  if (!p) return "";
  var rows = p.ratings.length
    ? p.ratings.slice().reverse().map(function(r, i){
        return '<div class="row" style="padding:6px 0;' + (i>0 ? "border-top:1px solid var(--border-soft);" : "") + '">' +
          '<span style="font-size:13px;color:var(--text-secondary);">Calificacion ' + (p.ratings.length - i) + '</span>' +
          '<span style="display:flex;align-items:center;gap:4px;color:var(--warning);"><span class="stat-icon" style="width:16px;height:16px;">' + ICON_STAR + '</span>' + r + '</span>' +
        '</div>';
      }).join("")
    : '<p style="font-size:13px;color:var(--text-tertiary);margin:0;">Todavia no tiene calificaciones.</p>';
  return '<div class="modal-backdrop" onclick="closeRatings()">' +
    '<div class="modal-sheet" onclick="event.stopPropagation()">' +
      '<p style="margin:0 0 4px;font-size:16px;font-weight:700;">' + p.name + '</p>' +
      '<p style="margin:0 0 14px;font-size:12px;color:var(--text-secondary);">Promedio ' + (promedio(p.ratings) ? promedio(p.ratings).toFixed(1) : "-") + '</p>' +
      rows +
      '<button class="btn-secondary" style="width:100%;margin-top:16px;" onclick="closeRatings()">Cerrar</button>' +
    '</div>' +
  '</div>';
}

function editModal(){
  if (!editingProfileId) return "";
  var p = players.filter(function(x){ return x.id === editingProfileId; })[0];
  if (!p) return "";
  return '<div class="modal-backdrop" onclick="closeEditProfile()">' +
    '<div class="modal-sheet" onclick="event.stopPropagation()">' +
      '<p style="margin:0 0 16px;font-size:16px;font-weight:700;">Editar perfil</p>' +
      '<label class="field-label">Nombre</label><input type="text" id="edit-name" value="' + p.name + '" />' +
      '<label class="field-label">Modelo de auto</label><input type="text" id="edit-model" value="' + p.car.model + '" />' +
      '<label class="field-label">Patente</label><input type="text" id="edit-plate" value="' + p.car.plate + '" />' +
      '<label class="field-label">Direccion</label><input type="text" id="edit-address" value="' + p.address + '" />' +
      '<div style="display:flex;gap:8px;margin-top:18px;">' +
        '<button class="btn-secondary" style="flex:1;" onclick="closeEditProfile()">Cancelar</button>' +
        '<button class="btn-primary" style="flex:1;" onclick="saveEditProfile(\'' + p.id + '\')">Guardar</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function computeStreak(p){
  var streak = 0;
  for (var i = 0; i < poolHistory.length; i++){
    var h = poolHistory[i];
    var wasDriver = h.driverIds && h.driverIds.indexOf(p.id) !== -1;
    if (wasDriver) break;
    var wasPassenger = h.passengers && Object.keys(h.passengers).some(function(k){ return h.passengers[k].indexOf(p.name) !== -1; });
    if (wasPassenger) { streak++; } else { break; }
  }
  return streak;
}

function renderEstadisticas(){
  var ordenados = players.slice().sort(function(a,b){ return ratioDe(b) - ratioDe(a); });

  var html = '<div class="card">';
  html += '<p style="margin:0 0 12px;font-size:13px;font-weight:700;color:var(--text-secondary);">RANKING</p>';
  html += '<div style="display:flex;font-size:10px;font-weight:700;color:var(--text-tertiary);letter-spacing:0.04em;padding-bottom:8px;">' +
    '<span style="flex:1.4;">NOMBRE</span>' +
    '<span style="width:52px;text-align:center;">RATIO</span>' +
    '<span style="width:44px;text-align:center;">CHOFER</span>' +
    '<span style="width:52px;text-align:center;">PASAJ.</span>' +
    '<span style="width:52px;text-align:center;">COLECT.</span>' +
  '</div>';
  ordenados.forEach(function(p, i){
    var ratio = ratioDe(p);
    html += '<div style="display:flex;align-items:center;padding:8px 0;font-size:13px;' + (i>0 ? "border-top:1px solid var(--border-soft);" : "") + '">' +
      '<span style="flex:1.4;">' + p.name + '</span>' +
      '<span style="width:52px;text-align:center;font-weight:700;color:' + ratioColor(ratio) + ';">' + formatRatio(ratio) + '</span>' +
      '<span style="width:44px;text-align:center;color:var(--text-secondary);">' + p.viajesChofer + '</span>' +
      '<span style="width:52px;text-align:center;color:var(--text-secondary);">' + p.viajesPasajero + '</span>' +
      '<span style="width:52px;text-align:center;color:var(--text-secondary);">' + p.colectivos + '</span>' +
    '</div>';
  });
  html += '</div>';

  var ordenadosChofer = players.slice().sort(function(a,b){
    var avgA = promedio(a.ratings), avgB = promedio(b.ratings);
    if (avgA === null && avgB === null) return 0;
    if (avgA === null) return 1;
    if (avgB === null) return -1;
    return avgB - avgA;
  });
  html += '<div class="card">';
  html += '<p style="margin:0 0 10px;font-size:13px;font-weight:700;color:var(--text-secondary);">CALIFICACIONES</p>';
  ordenadosChofer.forEach(function(p, i){
    var avg = promedio(p.ratings);
    html += '<div class="row" style="padding:7px 0;' + (i>0 ? "border-top:1px solid var(--border-soft);" : "") + '">' +
      '<span style="display:flex;align-items:center;gap:8px;font-size:13px;"><span style="color:var(--text-tertiary);width:16px;">' + (i+1) + '</span>' + p.name + '</span>' +
      '<span style="display:flex;align-items:center;gap:5px;font-weight:700;">' + (avg ? avg.toFixed(1) : "-") + ' <span class="stat-icon" style="width:16px;height:16px;color:var(--warning);">' + ICON_STAR + '</span></span>' +
    '</div>';
  });
  html += '</div>';

  var conRacha = players.filter(function(p){ return computeStreak(p) > 0; }).sort(function(a,b){ return computeStreak(b) - computeStreak(a); });
  if (conRacha.length) {
    html += '<div class="card">';
    html += '<p style="margin:0 0 10px;font-size:13px;font-weight:700;color:var(--text-secondary);">RACHA COMO PASAJERO</p>';
    conRacha.forEach(function(p, i){
      var s = computeStreak(p);
      html += '<div class="row" style="padding:6px 0;' + (i>0 ? "border-top:1px solid var(--border-soft);" : "") + '">' +
        '<span style="font-size:13px;">' + p.name + '</span>' +
        '<span style="font-size:13px;font-weight:700;color:var(--text-primary);">' + s + ' semana' + (s===1?"":"s") + '</span>' +
      '</div>';
    });
    html += '</div>';
  }

  return html;
}

function renderPerfiles(){
  return '<div class="profile-grid">' + players.map(profileCard).join("") + '</div>';
}

function historyItem(h){
  var ddmm, yyyy;
  if (h.dateISO) {
    var parts = h.dateISO.split("-");
    yyyy = parts[0]; ddmm = parts[2] + "/" + parts[1];
  } else {
    var fp = (h.fecha || "").split("/");
    ddmm = fp.length >= 2 ? fp[0] + "/" + fp[1] : (h.fecha || "-");
    yyyy = fp.length >= 3 ? fp[2] : "";
  }
  var driverNames = (h.drivers || []).join(", ") || "-";
  var allPassengers = [];
  if (h.passengers) {
    Object.keys(h.passengers).forEach(function(k){ allPassengers = allPassengers.concat(h.passengers[k]); });
  }
  var passengerNames = allPassengers.join(", ") || "-";
  var hasColectivo = h.passengers && Object.keys(h.passengers).some(function(k){ return h.passengers[k].length === 4; });
  var busTag = hasColectivo ? '<span style="margin-left:auto;flex-shrink:0;align-self:center;color:var(--accent);"><span style="display:inline-flex;width:22px;height:22px;">' + ICON_BUS + '</span></span>' : "";
  return '<div class="card" style="display:flex;gap:16px;align-items:flex-start;cursor:pointer;" onclick="openEditHistory(\'' + h.dateISO + '\')">' +
    '<div style="min-width:52px;flex-shrink:0;text-align:center;">' +
      '<p style="margin:0;font-size:16px;font-weight:700;color:#ffffff;">' + ddmm + '</p>' +
      '<p style="margin:2px 0 0;font-size:16px;font-weight:700;color:#ffffff;">' + yyyy + '</p>' +
    '</div>' +
    '<div style="flex:1;">' +
      '<p style="margin:0;font-size:13px;line-height:1.4;"><span style="color:var(--accent);font-weight:700;">CHOFER:</span> <span style="color:var(--text-secondary);">' + driverNames + '</span></p>' +
      '<p style="margin:6px 0 0;font-size:13px;line-height:1.4;"><span style="color:var(--success);font-weight:700;">PASAJEROS:</span> <span style="color:var(--text-secondary);">' + passengerNames + '</span></p>' +
    '</div>' +
    busTag +
  '</div>';
}

function openEditHistory(dateISO){
  if (!dateISO) return;
  editingHistoryDate = dateISO;
  render();
}
function closeEditHistory(){ editingHistoryDate = null; render(); }

function roleOfPlayerInEntry(h, p){
  if (h.driverIds && h.driverIds.indexOf(p.id) !== -1) return "chofer";
  if (h.passengers && Object.keys(h.passengers).some(function(k){ return h.passengers[k].indexOf(p.name) !== -1; })) return "pasajero";
  return "no";
}

function reverseEntryStats(h){
  players = players.map(function(p){
    var wasDriver = h.driverIds && h.driverIds.indexOf(p.id) !== -1;
    var wasPassenger = h.passengers && Object.keys(h.passengers).some(function(k){ return h.passengers[k].indexOf(p.name) !== -1; });
    if (wasDriver) {
      var hadColectivo = h.passengers && h.passengers[p.name] && h.passengers[p.name].length === 4;
      return Object.assign({}, p, {
        viajesChofer: Math.max(0, p.viajesChofer - 1),
        colectivos: hadColectivo ? Math.max(0, p.colectivos - 1) : p.colectivos
      });
    }
    if (wasPassenger) {
      return Object.assign({}, p, { viajesPasajero: Math.max(0, p.viajesPasajero - 1) });
    }
    return p;
  });
}

function applyEntryStats(h){
  players = players.map(function(p){
    var isDriver = h.driverIds && h.driverIds.indexOf(p.id) !== -1;
    var isPassenger = h.passengers && Object.keys(h.passengers).some(function(k){ return h.passengers[k].indexOf(p.name) !== -1; });
    if (isDriver) {
      var hasColectivo = h.passengers && h.passengers[p.name] && h.passengers[p.name].length === 4;
      return Object.assign({}, p, {
        viajesChofer: p.viajesChofer + 1,
        colectivos: hasColectivo ? p.colectivos + 1 : p.colectivos
      });
    }
    if (isPassenger) {
      return Object.assign({}, p, { viajesPasajero: p.viajesPasajero + 1 });
    }
    return p;
  });
}

function saveHistoryEdit(dateISO){
  var entry = poolHistory.filter(function(h){ return h.dateISO === dateISO; })[0];
  if (!entry) return;

  reverseEntryStats(entry);

  var newDrivers = [], newDriverIds = [], newPassengerNames = [];
  players.forEach(function(p){
    var sel = document.getElementById("hist-role-" + p.id);
    if (!sel) return;
    if (sel.value === "chofer") { newDrivers.push(p.name); newDriverIds.push(p.id); }
    else if (sel.value === "pasajero") { newPassengerNames.push(p.name); }
  });

  var newPassengersByDriver = {};
  newDrivers.forEach(function(d){ newPassengersByDriver[d] = []; });
  if (newDrivers.length === 1) {
    newPassengersByDriver[newDrivers[0]] = newPassengerNames.slice();
  } else if (newDrivers.length >= 2) {
    newPassengerNames.forEach(function(name, i){
      var d = newDrivers[i % newDrivers.length];
      newPassengersByDriver[d].push(name);
    });
  }

  entry.drivers = newDrivers;
  entry.driverIds = newDriverIds;
  entry.passengers = newPassengersByDriver;

  applyEntryStats(entry);
  saveState();
  editingHistoryDate = null;
  render();
}

function editHistoryModal(){
  if (!editingHistoryDate) return "";
  var h = poolHistory.filter(function(x){ return x.dateISO === editingHistoryDate; })[0];
  if (!h) return "";
  var parts = h.dateISO.split("-");
  var display = parts[2] + "/" + parts[1] + "/" + parts[0];
  var rows = players.map(function(p){
    var role = roleOfPlayerInEntry(h, p);
    return '<div style="margin-bottom:12px;">' +
      '<label class="field-label" style="margin-top:0;">' + p.name + '</label>' +
      '<select id="hist-role-' + p.id + '" style="width:100%;background:var(--bg-elevated-2);border:1px solid var(--border);color:var(--text-primary);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;">' +
        '<option value="chofer"' + (role==="chofer"?" selected":"") + '>Chofer</option>' +
        '<option value="pasajero"' + (role==="pasajero"?" selected":"") + '>Pasajero</option>' +
        '<option value="no"' + (role==="no"?" selected":"") + '>No jugo</option>' +
      '</select>' +
    '</div>';
  }).join("");
  return '<div class="modal-backdrop" onclick="closeEditHistory()">' +
    '<div class="modal-sheet" onclick="event.stopPropagation()">' +
      '<p style="margin:0 0 4px;font-size:16px;font-weight:700;">Editar viaje</p>' +
      '<p style="margin:0 0 16px;font-size:12px;color:var(--text-secondary);">' + display + '</p>' +
      rows +
      '<div style="display:flex;gap:8px;margin-top:6px;">' +
        '<button class="btn-secondary" style="flex:1;" onclick="closeEditHistory()">Cancelar</button>' +
        '<button class="btn-primary" style="flex:1;" onclick="saveHistoryEdit(\'' + h.dateISO + '\')">Guardar</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function renderHistorial(){
  if (!poolHistory.length) {
    return '<div class="empty">' +
      '<p style="margin:0 0 14px;">Todavia no hay semanas guardadas.</p>' +
      '<button class="btn-secondary" onclick="setTab(\'semana\')">Ir a designar el primer chofer</button>' +
    '</div>';
  }
  return poolHistory.map(historyItem).join("");
}

function renderAjustes(){
  var me = players.filter(function(p){ return p.id === currentUserId; })[0];
  var html = "";

  if (!me) {
    html += '<div class="card">';
    html += '<p style="margin:0 0 12px;font-size:13px;font-weight:700;color:var(--text-secondary);">QUIEN SOS?</p>';
    html += '<p style="margin:0 0 12px;font-size:12px;color:var(--text-tertiary);">Elegi tu perfil para poder editar tu auto, patente y direccion.</p>';
    players.forEach(function(p){
      html += '<button class="btn-secondary" style="width:100%;margin-bottom:8px;text-align:left;" onclick="setCurrentUser(\'' + p.id + '\')">' + p.name + '</button>';
    });
    html += '</div>';
  } else {
    html += '<div class="card">';
    html += '<div class="row" style="margin-bottom:14px;">' +
      '<span style="font-size:15px;font-weight:600;">' + me.name + '</span>' +
      '<button class="btn-ghost" onclick="changeCurrentUser()">Cambiar perfil</button>' +
    '</div>';
    html += '<div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;">' +
      avatarHtml(me, 64, 20) +
      '<div style="display:flex;flex-direction:column;gap:8px;">' +
        '<label class="btn-secondary" style="cursor:pointer;text-align:center;">Subir foto<input type="file" accept="image/*" style="display:none;" onchange="handlePhotoUpload(\'' + me.id + '\', this)" /></label>' +
        (me.photo ? '<button class="btn-ghost" style="color:var(--danger);" onclick="removePhoto(\'' + me.id + '\')">Quitar foto</button>' : '') +
      '</div>' +
    '</div>';
    html += '<label class="field-label" style="margin-top:0;">Modelo de auto</label>' +
      '<input type="text" value="' + me.car.model + '" onchange="updateCar(\'' + me.id + '\',\'model\',this.value)" />' +
      '<label class="field-label">Patente</label>' +
      '<input type="text" value="' + me.car.plate + '" onchange="updateCar(\'' + me.id + '\',\'plate\',this.value)" />' +
      '<label class="field-label">Direccion</label>' +
      '<input type="text" value="' + me.address + '" onchange="updateAddress(\'' + me.id + '\', this.value)" />';
    html += '</div>';
  }

  html += '<button class="btn-secondary" style="width:100%;margin-bottom:16px;" onclick="addPlayer()"><i class="ti ti-plus"></i> Agregar usuario</button>';

  html += '<div class="card">';
  html += '<p style="margin:0 0 10px;font-size:13px;font-weight:700;color:var(--text-secondary);">DESTINO</p>';
  html += '<label class="field-label" style="margin-top:0;">Nombre</label><input type="text" value="' + venue.name + '" onchange="updateVenue(\'name\', this.value)" />';
  html += '<label class="field-label">Direccion</label><input type="text" value="' + venue.address + '" onchange="updateVenue(\'address\', this.value)" />';
  html += '</div>';

  html += '<div class="card">';
  html += '<p style="margin:0 0 10px;font-size:13px;font-weight:700;color:var(--text-secondary);">DATOS</p>';
  html += '<button class="btn-secondary" style="width:100%;margin-bottom:8px;" onclick="exportBackup()">Exportar backup</button>';
  html += '<label class="btn-secondary" style="width:100%;display:block;text-align:center;box-sizing:border-box;margin-bottom:8px;cursor:pointer;">Restaurar backup<input type="file" accept="application/json" style="display:none;" onchange="importBackup(this)" /></label>';
  html += '<button class="btn-secondary" style="width:100%;color:var(--danger);border-color:var(--danger);" onclick="resetAllData()">Borrar ratios e historial</button>';
  html += '</div>';

  return html;
}

function render(){
  var app = document.getElementById("app");
  var html = '<div class="top-header">' +
    '<div class="title-pill"><span class="title-logo">' + LOGO_SVG + '</span><h1>Uber Zona Norte</h1></div>' +
  '</div>';
  html += tabsBar();
  if (activeTab === "semana") html += renderSemana();
  else if (activeTab === "perfiles") html += renderPerfiles();
  else if (activeTab === "estadisticas") html += renderEstadisticas();
  else if (activeTab === "ajustes") html += renderAjustes();
  else html += renderHistorial();
  html += editModal();
  html += ratingsModal();
  html += editHistoryModal();
  app.innerHTML = html;
  if (activeTab === "semana" && result && result.cars) mountLiveMap(getMyCars(result.cars));
}

function mountLiveMap(cars){
  var el = document.getElementById("gmap");
  if (!el || !GOOGLE_MAPS_READY) return;
  var anyLive = cars.some(function(c){ return c.route && c.route.live && c.route.directions; });
  if (!anyLive) return;
  var darkStyle = [
    { elementType: "geometry", stylers: [{ color: "#1c1c1e" }] },
    { elementType: "labels.text.stroke", stylers: [{ color: "#1c1c1e" }] },
    { elementType: "labels.text.fill", stylers: [{ color: "#8e8e93" }] },
    { featureType: "road", elementType: "geometry", stylers: [{ color: "#2c2c2e" }] },
    { featureType: "road.arterial", elementType: "geometry", stylers: [{ color: "#38383a" }] },
    { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#48484a" }] },
    { featureType: "water", elementType: "geometry", stylers: [{ color: "#0a84ff33" }] },
    { featureType: "poi", stylers: [{ visibility: "off" }] },
    { featureType: "transit", stylers: [{ visibility: "off" }] }
  ];
  var map = new google.maps.Map(el, { zoom: 12, styles: darkStyle, disableDefaultUI: true, zoomControl: true });
  var bounds = new google.maps.LatLngBounds();
  cars.forEach(function(c, i){
    if (!c.route || !c.route.live || !c.route.directions) return;
    var renderer = new google.maps.DirectionsRenderer({
      map: map, directions: c.route.directions, suppressMarkers: false,
      polylineOptions: { strokeColor: carColors[i % carColors.length], strokeWeight: 4 }
    });
    var legs = c.route.directions.routes[0].legs;
    legs.forEach(function(leg){
      bounds.extend(leg.start_location);
      bounds.extend(leg.end_location);
    });
  });
  if (!bounds.isEmpty()) map.fitBounds(bounds);
}

function startApp(){
  if (FIREBASE_ENABLED) {
    docRef.onSnapshot(function(doc){
      if (doc.exists) {
        var data = doc.data();
        if (data.players) players = data.players;
        if (data.poolHistory) poolHistory = data.poolHistory;
        if (data.venue) venue = Object.assign(venue, data.venue);
        players.forEach(function(p){ if (!(p.id in confirmed)) confirmed[p.id] = true; });
      } else {
        docRef.set({ players: defaultPlayers, poolHistory: importedHistory, venue: venue });
      }
      render();
    }, function(err){
      console.error("Error conectando a Firestore:", err);
      document.getElementById("app").innerHTML = '<div class="empty">No se pudo conectar con la base de datos compartida. Revisa la configuracion de Firebase y las reglas de Firestore.</div>';
    });
  } else {
    render();
  }
}
startApp();
</script>
